openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Mahlzeit+ API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: nutrition-profiles
    description: Nutrition profile operations
  - name: user-settings
    description: User settings operations
  - name: ingredients
    description: Ingredient operations
  - name: recipes
    description: Recipe operations
  - name: meal-plans
    description: Meal plan operations
  - name: today
    description: Today screen operations
  - name: shopping-lists
    description: Shopping list operations
  - name: scanner
    description: Barcode scanner and product score operations
  - name: learn
    description: Learning profile and personalisation aggregation
  - name: costs
    description: Cost estimation operations
  - name: chat
    description: Bewusster Begleiter chat operations
  - name: coaching-products
    description: Coaching products admin CRUD
  - name: fridge
    description: Automatic fridge/pantry tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /nutrition-profiles:
    get:
      operationId: listNutritionProfiles
      tags: [nutrition-profiles]
      summary: List all nutrition profiles
      responses:
        "200":
          description: List of nutrition profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NutritionProfile"

  /nutrition-profiles/{id}:
    get:
      operationId: getNutritionProfile
      tags: [nutrition-profiles]
      summary: Get a nutrition profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Nutrition profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionProfile"
        "404":
          description: Not found

  /user-settings:
    get:
      operationId: getUserSettings
      tags: [user-settings]
      summary: Get current user settings
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "404":
          description: Not found (user has no settings yet)
    post:
      operationId: createOrUpdateUserSettings
      tags: [user-settings]
      summary: Create or update user settings (upsert)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsInput"
      responses:
        "200":
          description: Updated user settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"

  /ingredients:
    get:
      operationId: listIngredients
      tags: [ingredients]
      summary: List ingredients
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"

  /recipes:
    get:
      operationId: listRecipes
      tags: [recipes]
      summary: List recipes for current user
      parameters:
        - name: energyType
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: tags
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"
    post:
      operationId: createRecipe
      tags: [recipes]
      summary: Create a new recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeInput"
      responses:
        "201":
          description: Created recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"

  /recipes/{id}:
    get:
      operationId: getRecipe
      tags: [recipes]
      summary: Get a recipe by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Not found
    patch:
      operationId: updateRecipe
      tags: [recipes]
      summary: Update a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeInput"
      responses:
        "200":
          description: Updated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
    delete:
      operationId: deleteRecipe
      tags: [recipes]
      summary: Delete a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /recipes/import-screenshot:
    post:
      operationId: importRecipeScreenshot
      tags: [recipes]
      summary: Import a recipe from a screenshot using AI vision
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
              required:
                - images
      responses:
        "200":
          description: Extracted recipe data from screenshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRecipeOutput"
        "400":
          description: No recipe detected or invalid image
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error

  /meal-plans:
    get:
      operationId: listMealPlans
      tags: [meal-plans]
      summary: List meal plans for current user
      responses:
        "200":
          description: List of meal plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealPlan"
    post:
      operationId: createMealPlan
      tags: [meal-plans]
      summary: Create a new meal plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealPlanInput"
      responses:
        "201":
          description: Created meal plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlan"

  /meal-plans/starter:
    post:
      operationId: createStarterMealPlan
      tags: [meal-plans]
      summary: Create or return an active starter meal plan with sample entries
      description: >
        Creates a 7-day meal plan with 3 sample entries (Frühstück, Mittagessen, Abendessen)
        from public recipes and sets it as active. If an active plan already exists,
        returns it without modification. Idempotent.
      responses:
        "200":
          description: Existing active meal plan returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanDetail"
        "201":
          description: Starter meal plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanDetail"
        "401":
          description: Unauthorized

  /meal-plans/active:
    get:
      operationId: getActiveMealPlan
      tags: [meal-plans]
      summary: Get the active meal plan with all entries
      responses:
        "200":
          description: Active meal plan with days and entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanDetail"
        "404":
          description: No active plan

  /meal-plans/{id}:
    get:
      operationId: getMealPlan
      tags: [meal-plans]
      summary: Get a meal plan by ID with all days and entries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Meal plan detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanDetail"
        "404":
          description: Not found
    patch:
      operationId: updateMealPlan
      tags: [meal-plans]
      summary: Update meal plan metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealPlanUpdateInput"
      responses:
        "200":
          description: Updated meal plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlan"
    delete:
      operationId: deleteMealPlan
      tags: [meal-plans]
      summary: Delete a meal plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /meal-plans/{id}/activate:
    post:
      operationId: activateMealPlan
      tags: [meal-plans]
      summary: Set a meal plan as the active plan (deactivates others)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activated meal plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlan"

  /meal-plans/{id}/copy:
    post:
      operationId: copyMealPlan
      tags: [meal-plans]
      summary: Copy a meal plan as a new instance (Wiederholung)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                setActive:
                  type: boolean
      responses:
        "201":
          description: Copied meal plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanDetail"

  /meal-plans/{id}/swap-days:
    post:
      operationId: swapMealPlanDays
      tags: [meal-plans]
      summary: Swap all entries between two days
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dayNumberA:
                  type: integer
                dayNumberB:
                  type: integer
              required:
                - dayNumberA
                - dayNumberB
      responses:
        "200":
          description: Updated meal plan after swap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanDetail"

  /meal-plans/{id}/days:
    post:
      operationId: addMealPlanDay
      tags: [meal-plans]
      summary: Add a day to a meal plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dayNumber:
                  type: integer
              required:
                - dayNumber
      responses:
        "201":
          description: Created day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanDay"

  /meal-plans/{id}/days/{dayId}/entries:
    post:
      operationId: addMealEntry
      tags: [meal-plans]
      summary: Add a meal entry to a plan day
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealEntryInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealEntry"

  /meal-plans/{id}/days/{dayId}/entries/{entryId}:
    put:
      operationId: updateMealEntry
      tags: [meal-plans]
      summary: Update (replace) a meal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealEntryInput"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealEntry"
    delete:
      operationId: deleteMealEntry
      tags: [meal-plans]
      summary: Delete a meal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /today:
    get:
      operationId: getTodayMeals
      tags: [today]
      summary: Get today's meals from the active plan
      responses:
        "200":
          description: Today's meals summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodaySummary"

  /shopping-lists:
    get:
      operationId: listShoppingLists
      tags: [shopping-lists]
      summary: List all shopping lists for current user
      responses:
        "200":
          description: List of shopping lists (summaries)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShoppingListSummary"

  /shopping-lists/generate:
    post:
      operationId: generateShoppingList
      tags: [shopping-lists]
      summary: Auto-generate a shopping list from the active meal plan
      responses:
        "201":
          description: Generated shopping list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingList"
        "404":
          description: No active meal plan

  /shopping-lists/{id}:
    get:
      operationId: getShoppingList
      tags: [shopping-lists]
      summary: Get a shopping list with all items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Shopping list with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingList"
        "404":
          description: Not found
    delete:
      operationId: deleteShoppingList
      tags: [shopping-lists]
      summary: Delete a shopping list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /shopping-lists/{id}/archive:
    post:
      operationId: archiveShoppingList
      tags: [shopping-lists]
      summary: Archive a shopping list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archived shopping list summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingListSummary"

  /shopping-lists/{id}/items:
    post:
      operationId: addShoppingListItem
      tags: [shopping-lists]
      summary: Add a manual item to a shopping list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualItemInput"
      responses:
        "201":
          description: Added item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingListItem"

  /shopping-lists/{id}/items/{itemId}/toggle:
    patch:
      operationId: toggleShoppingListItem
      tags: [shopping-lists]
      summary: Toggle the checked state of a shopping list item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingListItem"

  /shopping-lists/{id}/items/{itemId}:
    delete:
      operationId: deleteShoppingListItem
      tags: [shopping-lists]
      summary: Delete a manual shopping list item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /ai/generate-recipe:
    post:
      operationId: aiGenerateRecipe
      tags: [ai]
      summary: Generate a recipe using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiGenerateRecipeInput"
      responses:
        "200":
          description: Generated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRecipeOutput"

  /ai/generate-plan:
    post:
      operationId: aiGeneratePlan
      tags: [ai]
      summary: Generate a weekly meal plan using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiGeneratePlanInput"
      responses:
        "200":
          description: Generated meal plan suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPlanOutput"

  /ai/adjust-recipe:
    post:
      operationId: aiAdjustRecipe
      tags: [ai]
      summary: Adjust an existing recipe using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAdjustRecipeInput"
      responses:
        "200":
          description: Adjusted recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRecipeOutput"

  /ai/substitute-ingredient:
    post:
      operationId: aiSubstituteIngredient
      tags: [ai]
      summary: Suggest ingredient substitutions using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSubstituteInput"
      responses:
        "200":
          description: Substitution suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSubstituteOutput"

  /ai/save-recipe:
    post:
      operationId: aiSaveRecipe
      tags: [ai]
      summary: Save an AI-generated recipe as a real recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiRecipeOutput"
      responses:
        "201":
          description: Saved recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"

  /ai/feedback:
    post:
      operationId: aiSubmitFeedback
      tags: [ai]
      summary: Submit meal feedback (thumbs up/down)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiFeedbackInput"
      responses:
        "201":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealFeedback"

  /learn/profile:
    get:
      operationId: getLearnProfile
      tags: [learn]
      summary: Get the user's learned preferences profile
      responses:
        "200":
          description: Learned preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserLearnedPreferences"
        "404":
          description: No profile yet (run aggregate first)
    delete:
      operationId: resetLearnProfile
      tags: [learn]
      summary: Reset the user's learned preferences (deletes all aggregated data)
      responses:
        "204":
          description: Profile deleted

  /learn/aggregate:
    post:
      operationId: triggerLearnAggregate
      tags: [learn]
      summary: Manually trigger the aggregation job for the current user
      responses:
        "200":
          description: Aggregation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserLearnedPreferences"

  /costs/recipe/{id}:
    get:
      operationId: getRecipeCost
      tags: [costs]
      summary: Calculate cost estimate for a recipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: servings
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeCost"
        "404":
          description: Recipe not found

  /costs/shopping-list/{id}:
    get:
      operationId: getShoppingListCost
      tags: [costs]
      summary: Calculate total cost for a shopping list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimate"
        "404":
          description: Shopping list not found

  /costs/today:
    get:
      operationId: getTodayCost
      tags: [costs]
      summary: Calculate cost for today's planned meals
      responses:
        "200":
          description: Today's cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayCost"

  /fridge:
    get:
      operationId: getFridgeItems
      tags: [fridge]
      summary: Get current fridge items (likely_available and maybe_low)
      responses:
        "200":
          description: List of fridge items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FridgeItem"

  /fridge/{id}:
    patch:
      operationId: updateFridgeItem
      tags: [fridge]
      summary: Update fridge item status (e.g. "Hab ich noch" flow)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFridgeItemBody"
      responses:
        "200":
          description: Updated fridge item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FridgeItemRaw"
        "404":
          description: Item not found

  /scanner/lookup/{barcode}:
    get:
      operationId: scannerLookup
      tags: [scanner]
      summary: Look up a product by barcode (cached or live Open Food Facts)
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product with score breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannedProduct"
        "404":
          description: Product not found
        "400":
          description: Invalid barcode

  /scanner/score/{barcode}:
    get:
      operationId: getScannerScore
      tags: [scanner]
      summary: Get score breakdown for a barcode (uses cache or live lookup)
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Score breakdown for the product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreBreakdown"
        "404":
          description: Product not found
        "400":
          description: Invalid barcode

  /scanner/history:
    get:
      operationId: getScanHistory
      tags: [scanner]
      summary: List user's scan history (most recent first)
      responses:
        "200":
          description: List of scanned products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScannedProduct"

  /chat/message:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the Bewusster Begleiter chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Chat reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageReply"
        "400":
          description: Invalid message
        "401":
          description: Unauthorized

  /admin/products:
    get:
      operationId: listCoachingProducts
      tags: [coaching-products]
      summary: List all coaching products (admin)
      responses:
        "200":
          description: List of coaching products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoachingProduct"
        "403":
          description: Forbidden
    post:
      operationId: createCoachingProduct
      tags: [coaching-products]
      summary: Create a coaching product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachingProductInput"
      responses:
        "201":
          description: Created coaching product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachingProduct"
        "403":
          description: Forbidden

  /admin/products/{id}:
    get:
      operationId: getCoachingProduct
      tags: [coaching-products]
      summary: Get a coaching product by ID (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Coaching product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachingProduct"
        "404":
          description: Not found
    patch:
      operationId: updateCoachingProduct
      tags: [coaching-products]
      summary: Update a coaching product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachingProductUpdate"
      responses:
        "200":
          description: Updated coaching product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachingProduct"
        "404":
          description: Not found
    delete:
      operationId: deleteCoachingProduct
      tags: [coaching-products]
      summary: Delete a coaching product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

